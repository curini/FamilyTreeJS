<div *ngIf="defaultValues.length > 0">
  <div *ngFor="let family of defaultValues">
    <h1>{{ family.name }}</h1>
  </div>
</div>
<div *ngIf="defaultValues.length == 0">
  <h1>{{ titre }}</h1>
</div>
<form>
  <input type="text" class="form-control" />
  <button type="submit" class="btn btn-primary mt-2">Valider</button>
</form>
