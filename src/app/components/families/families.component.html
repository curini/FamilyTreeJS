
<table class="table table-striped table-bordered">
    <thead>
    <tr>
        <th *ngFor="let header of headers">{{ header | titlecase }}</th>
        <th>Action</th>
    </tr>
</thead>
<tbody>
    <tr *ngFor="let family of paginatedFamilies">
        <td *ngFor="let item of headers">
            {{ family[item] ?? ''}}
        </td>
        <td>
            <a [routerLink]="['/edit', family.key]" class="btn btn-sm btn-outline-primary">
                <i class="bi bi-pencil"></i>
            </a>
        </td>
    </tr>
</tbody>
</table>
<nav aria-label="Page navigation">
    <ul class="pagination justify-content-center">
      <li class="page-item" [class.disabled]="currentPage === 1">
        <a class="page-link" href="#" (click)="prevPage()"><</a>
      </li>
      
      <li *ngFor="let page of pageNumbers" class="page-item" [class.active]="page === currentPage">
        <a class="page-link" href="#" (click)="currentPage = page">{{ page }}</a>
      </li>
      
      <li class="page-item" [class.disabled]="currentPage === totalPages">
        <a class="page-link" href="#" (click)="nextPage()">></a>
      </li>
    </ul>
  </nav>
