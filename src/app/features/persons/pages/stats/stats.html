<div class="flex flex-col gap-6 p-6">
  <h1 class="text-3xl font-bold">Welcome</h1>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 p-6">
    <div class="bg-white border border-gray-200 rounded-xl p-4 shadow">
      <div class="aspect-video bg-gray-100 flex items-center justify-center rounded-lg">
        <app-map [markers]="stats.markers"></app-map>
      </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      @if (stats.person) {
        @for (person of stats.person | keyvalue; track person.key) {
          <div
            class="bg-white border border-gray-200 rounded-xl p-4 shadow hover:shadow-md transition"
          >
            <h2 class="text-sm font-semibold text-gray-600">
              {{ titles[person.key] }}
            </h2>
            <p class="text-xl font-bold {{ person.value.color }} mt-2">
              {{ person.value.value }}
            </p>
          </div>
        }
      } @else {
        <p class="text-gray-500 col-span-full">No statistics available.</p>
      }
    </div>
  </div>
</div>
